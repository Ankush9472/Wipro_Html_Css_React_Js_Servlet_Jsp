<!DOCTYPE html>
<html>

<head>
    <title>Student Management</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }


        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .logo-img {
            width: 60px;
            height: 60px;
            vertical-align: middle;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            display: inline-block;
            margin-left: 10px;
        }

        /* Navbar */
        nav {
            background-color: #34495e;
            text-align: center;
            padding: 10px;
        }



        nav button:hover {
            background-color: #2ecc71;
            color: white;
        }

        /* Sections */
        .section {
            display: none;
            padding: 30px;
            text-align: center;
        }

        #home {
            display: block;
        }


        .welcome {
            background-color: white;
            padding: 20px;
            margin: 30px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        .school-img {
            width: 300px;
            margin-top: 20px;
            border-radius: 10px;
        }

        /* Profile Card */
        .card {
            background-color: white;
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
    </style>

    <script>
        function showSection(id) {
            document.getElementById("home").style.display = "none";
            document.getElementById("profile").style.display = "none";

            document.getElementById(id).style.display = "block";
        }
    </script>
</head>
