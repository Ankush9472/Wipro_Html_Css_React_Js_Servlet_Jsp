<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Text Demo</title>
</head>

<body>

    <h1 id="Hello">Original Text</h1>

    <button id="ChangeText">Change Content</button>

    <script>
        const btn = document.getElementById("ChangeText");

        btn.addEventListener("click", function () {
            document.getElementById("Hello").innerHTML = "We have changed the text!";
        });
    </script>

</body>

</html>
