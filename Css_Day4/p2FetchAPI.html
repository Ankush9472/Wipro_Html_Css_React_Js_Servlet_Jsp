<!DOCTYPE html>
<html>

<head>
    <title>Fetch Example</title>
</head>

<body>

    <h3> Users Data in JSON</h3>

    <!-- first creating an element as ul in html and then we will append li items using js -->
    <ul id="users"></ul>

    <script>
        // to retrieve the json data from this api
        fetch('https://jsonplaceholder.typicode.com/users')

            // convert response to json
            // .json() automatically parses JSON string into JavaScript object
            // similar to JSON.parse()
            .then(response => response.json())

            // now we get actual data
            .then(data => {

                // get the ul element from HTML
                const ul = document.getElementById("users");

                // loop through each user object
                data.forEach(user => {

                    // create new list item
                    const li = document.createElement("li");

                    // set text content using template string
                    li.textContent = `User Name : ${user.username} - EMail : ${user.email}`;

                    // append li to ul
                    ul.appendChild(li);
                });
            })

            // handle error if something goes wrong
            .catch(err => console.error("Error while loading the data", err));
    </script>

</body>

</html>
