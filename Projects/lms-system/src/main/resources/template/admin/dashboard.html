<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; }
        .nav { background: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav a { color: white; text-decoration: none; margin-right: 20px; }
        .container { padding: 30px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; }
        .stat { flex: 1; background: #3498db; color: white; padding: 25px; border-radius: 8px; text-align: center; }
        .stat h3 { margin: 0; font-size: 14px; }
        .stat p { font-size: 36px; margin: 10px 0; font-weight: bold; }
        .btn { display: inline-block; padding: 10px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 4px; margin-right: 10px; }
        .btn:hover { background: #2980b9; }
        .logout { background: #e74c3c; padding: 8px 15px; border-radius: 4px; }
    </style>
</head>
<body>
<div class="nav">
    <div>
        <strong>LMS Admin</strong> &nbsp;|&nbsp;
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/students}">Students</a>
        <a th:href="@{/admin/courses}">Courses</a>
    </div>
    <form th:action="@{/logout}" method="post" style="margin:0">
        <button class="logout" type="submit" style="border:none;color:white;cursor:pointer">Logout</button>
    </form>
</div>
<div class="container">
    <h1>Admin Dashboard</h1>
    <div class="stats">
        <div class="stat">
            <h3>TOTAL STUDENTS</h3>
            <p th:text="${studentCount}">0</p>
        </div>
        <div class="stat" style="background:#27ae60">
            <h3>TOTAL COURSES</h3>
            <p th:text="${courseCount}">0</p>
        </div>
    </div>
    <div class="card">
        <h2>Quick Actions</h2>
        <a class="btn" th:href="@{/admin/students/add}">Add Student</a>
        <a class="btn" th:href="@{/admin/courses/add}">Add Course</a>
        <a class="btn" th:href="@{/admin/students}">Manage Students</a>
        <a class="btn" th:href="@{/admin/courses}">Manage Courses</a>
    </div>
</div>
</body>
</html>
