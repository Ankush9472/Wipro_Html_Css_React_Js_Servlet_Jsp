<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; }
        .nav { background: #2c3e50; color: white; padding: 15px 30px; }
        .nav a { color: white; text-decoration: none; margin-right: 20px; }
        .container { padding: 30px; max-width: 500px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .err { color: red; font-size: 14px; margin-top: 3px; }
        button { margin-top: 20px; padding: 10px 25px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-back { display: inline-block; margin-top: 10px; color: #555; text-decoration: none; }
    </style>
</head>
<body>
<div class="nav">
    <strong>LMS Admin</strong> &nbsp;|&nbsp;
    <a th:href="@{/admin/dashboard}">Dashboard</a>
    <a th:href="@{/admin/students}">Students</a>
    <a th:href="@{/admin/courses}">Courses</a>
</div>
<div class="container">
    <h1>Add Course</h1>
    <div class="card">
        <form th:action="@{/admin/courses/save}" th:object="${course}" method="post">
            <label>Course Code</label>
            <input type="text" th:field="*{code}"/>
            <div class="err" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></div>

            <label>Title</label>
            <input type="text" th:field="*{title}"/>
            <div class="err" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

            <label>Credits</label>
            <input type="number" th:field="*{credits}"/>
            <div class="err" th:if="${#fields.hasErrors('credits')}" th:errors="*{credits}"></div>

            <label>Description</label>
            <textarea th:field="*{description}" rows="3"></textarea>
            <div class="err" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>

            <button type="submit">Save</button>
            <a class="btn-back" th:href="@{/admin/courses}">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
