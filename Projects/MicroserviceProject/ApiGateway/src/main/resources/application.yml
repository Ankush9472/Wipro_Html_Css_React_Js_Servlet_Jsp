spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Auto-discover services from Eureka and create routes for them
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # Manual route definitions (more control than auto-discovery)
      routes:

        # USER SERVICE routes
        - id: user-service
          uri: lb://user-ms                # lb:// means "look up via Eureka load balancer"
          predicates:
            - Path=/user/**

        # CONTACT SERVICE routes
        - id: contact-service
          uri: lb://contact-ms
          predicates:
            - Path=/contacts/**

        # ORDER SERVICE routes
        - id: order-service
          uri: lb://order-ms
          predicates:
            - Path=/orders/**

        # PAYMENT SERVICE routes
        - id: payment-service
          uri: lb://payment-ms
          predicates:
            - Path=/payments/**

server:
  port: 8080

# Eureka Client config
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Expose actuator endpoints to inspect routes and gateway info
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,routes

# Enable detailed gateway logging (useful while learning)
logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO