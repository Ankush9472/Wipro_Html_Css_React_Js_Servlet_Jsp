<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>


    <link rel="stylesheet" href="style.css">


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="Box">
        one box created
    </div>


    <div class="header-container">
        <div>logo</div>
        <div>Menu</div>
        <div>Profile</div>
    </div>


    <div class="container1">
        <div>
            <button type="button" class="btn btn-primary">Primary</button>
        </div>

        <div>
            <button type="button" class="btn btn-success">Success</button>
        </div>

        <div>
            <button type="button" class="btn btn-info">Info</button>
        </div>

    </div>


    <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">
        <ol class="carousel-indicators">
            <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>

            <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
            <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
        </ol>

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://images.pexels.com/photos/33032769/pexels-photo-33032769.jpeg" class="d-block w-100"
                    alt="image1">
            </div>


            <div class="carousel-item">
                <img src="https://images.pexels.com/photos/11076204/pexels-photo-11076204.jpeg" class="d-block w-100"
                    alt="image2">
            </div>

            <div class="carousel-item">
                <img src="https://images.pexels.com/photos/1103970/pexels-photo-1103970.jpeg" class="d-block w-100"
                    alt="image3">

            </div>
        </div>

        <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </a>

        <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
            <span class="carousel-control-next-icon"></span>
        </a>
    </div>


    <div class="container1">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
    </div>


    <div class="grid">
        <div class="box1">1 box</div>

        <div class="box1">2 box</div>
        <div class="box1">3 box</div>
    </div>


    <div class="box2">
        To check resizing on different screen
    </div>


    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
