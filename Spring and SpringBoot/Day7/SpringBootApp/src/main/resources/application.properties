spring.application.name=SpringBootAop

# Logging level for our service package
logging.level.com.company=INFO

# Console log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File log pattern
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log file location (auto-created)
logging.file.name=logs/Error.log